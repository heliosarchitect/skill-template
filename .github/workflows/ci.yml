name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate SKILL.md frontmatter
        run: python scripts/validate_skill_frontmatter.py SKILL.md

      - name: Lint shell scripts
        run: |
          shopt -s nullglob
          for f in scripts/*.sh; do
            bash -n "$f"
          done

      - name: Lint python scripts
        run: python -m compileall -q scripts

      - name: Smoke check scripts and examples present
        run: |
          test -x scripts/example_script.sh
          test -f scripts/example_script.py
          test -f examples/basic_usage.md
